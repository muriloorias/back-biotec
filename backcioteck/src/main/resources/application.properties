spring.application.name=backcioteck
# O banco será salvo na pasta do seu projeto com o nome "meubanco"
spring.datasource.url=jdbc:h2:file:./data/meubanco
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# Mantém a estrutura da tabela entre reinicializações
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console do H2 (opcional, mas muito útil)
spring.h2.console.enabled=true
